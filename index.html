  const labels = ["The Three Branches", "Economic & Political Systems", "About You", "Your Breakdown"];
  const pct = ((step - 1) / (TOTAL_STEPS - 1)) * 100;
  return (
    <div className="progress-wrap">
      <div className="progress-labels">
        {labels.map((l, i) => (
          <span key={i} className={`progress-label${step === i + 1 ? " active" : ""}`}>

        ))}
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

      <h2 className="step-title">The Three Branches of Government</h2>
      <p className="step-intro">
        The U.S. Constitution splits federal power among three co-equal branches so that no single person or group can control the government. Here's who is in each branch, what they do, and how they keep each other in check.
      </p>

      <div className="branch-grid">
        {BRANCHES.map((b) => (
          <div key={b.name} className="branch-card">
            <p className="branch-subtitle">{b.subtitle}</p>
            <h3>{b.name} Branch</h3>
            <p>{b.members}</p>
            <p><em>{b.role}</em></p>
            <ul>{b.powers.map((p, i) => <li key={i}>{p}</li>)}</ul>
          </div>
        ))}
      </div>

      <div className="checks-box">
        <h3>Checks & Balances</h3>
        <p style={{ fontSize: ".9rem", color: "var(--ink2)", marginBottom: 12 }}>
          Each branch has specific powers to limit the others — preventing any branch from becoming too powerful.
        </p>
        {CHECKS.map((c, i) => <div key={i} className="checks-item">{c}</div>)}
      </div>
    </>
  );
}

// Step 2
function StepSystems() {
  return (
    <>
      <p className="step-eyebrow">Step 2 of 4</p>
      <h2 className="step-title">Economic & Political Systems</h2>
      <p className="step-intro">
        These are two separate spectrums that often get conflated. Economic systems describe <em>who owns and controls resources</em>. Political orientation describes <em>the role of government in society</em>. Most real-world positions are a blend — these are broad generalizations to anchor your thinking.
      </p>

      <div className="system-section">
        <p className="system-section-title">Economic Systems: How resources and production are managed</p>
        <div className="compare-grid">
          {ECONOMIC_SYSTEMS.map((s) => (
            <div key={s.label} className="compare-card">
              <h4>{s.label}</h4>
              <p>{s.summary}</p>
              <ul>{s.traits.map((t, i) => <li key={i}>{t}</li>)}</ul>
            </div>
          ))}
        </div>
        <p className="disclaimer-note">Most developed economies — including the U.S. — are mixed economies with elements of both.</p>
      </div>

      <hr className="rule" />

      <div className="system-section">
        <p className="system-section-title">Political Orientation: The proper role and size of government</p>
        <div className="compare-grid">
          {POLITICAL_SPECTRUMS.map((s) => (
            <div key={s.label} className="compare-card">
              <h4>{s.label}</h4>
              <p>{s.summary}</p>
              <ul>{s.traits.map((t, i) => <li key={i}>{t}</li>)}</ul>
            </div>
          ))}
        </div>
        <p className="disclaimer-note">Almost everyone holds a mix of views. These labels are starting points, not rigid boxes. Real candidates and real policies rarely fit cleanly into one column.</p>
      </div>
    </>
  );
}

// Step 3
function StepAboutYou({ survey, setSurvey }) {
  function pick(field, value) {
    setSurvey(s => ({ ...s, [field]: value }));
  }
  function toggleMulti(field, value) {
    setSurvey(s => {
      const arr = s[field] || [];
      return { ...s, [field]: arr.includes(value) ? arr.filter(x => x !== value) : [...arr, value] };
    });
  }

  return (
    <>
      <p className="step-eyebrow">Step 3 of 4</p>
      <h2 className="step-title">About You</h2>
      <p className="step-intro">
        Your circumstances shape which policy trade-offs matter most to you. Answer as much or as little as you like — the breakdown in the next step uses your answers to add context.
      </p>

      <div className="privacy-banner">
        Nothing you enter here is saved, stored, or transmitted anywhere. It all stays in this browser tab and disappears when you close it.
      </div>

      <div className="question-block">
        <p className="question-label">What is your approximate household income?</p>
        <div className="btn-grid">
          {INCOME_RANGES.map(opt => (
            <button key={opt} className={`choice-btn${survey.income === opt ? " selected" : ""}`}
              onClick={() => pick("income", opt)}>{opt}</button>
          ))}
        </div>
      </div>

      <hr className="rule" />

      <div className="question-block">
        <p className="question-label">Roughly how much do you pay in income taxes each year?</p>
        <div className="btn-grid">
          {TAX_RANGES.map(opt => (
            <button key={opt} className={`choice-btn${survey.taxes === opt ? " selected" : ""}`}
              onClick={() => pick("taxes", opt)}>{opt}</button>
          ))}
        </div>
      </div>

      <hr className="rule" />

      <div className="question-block">
        <p className="question-label">Do you or your household currently receive any of the following? <span style={{fontStyle:"italic", fontWeight:400}}>(select all that apply)</span></p>
        <div className="btn-grid">
          {BENEFITS_OPTIONS.map(opt => (
            <button key={opt}
              className={`choice-btn${(survey.benefits || []).includes(opt) ? " selected" : ""}`}
              onClick={() => toggleMulti("benefits", opt)}>{opt}</button>
          ))}
        </div>
      </div>

      <hr className="rule" />

      <div className="question-block">
        <p className="question-label">How important is religion or faith to your personal worldview?</p>
        <div className="btn-grid">
          {RELIGION_OPTIONS.map(opt => (
            <button key={opt} className={`choice-btn${survey.religion === opt ? " selected" : ""}`}
              onClick={() => pick("religion", opt)}>{opt}</button>
          ))}
        </div>
      </div>

      <hr className="rule" />

      <div className="question-block">
        <p className="question-label">Pick up to 3 issues that matter most to you right now.</p>
        <div className="btn-grid">
          {ISSUES.map(issue => {
            const selected = (survey.topIssues || []).includes(issue.id);
            const maxed = (survey.topIssues || []).length >= 3 && !selected;
            return (
              <button key={issue.id}
                className={`choice-btn${selected ? " selected" : ""}`}
                style={maxed ? { opacity: .4, cursor: "not-allowed" } : {}}
                onClick={() => !maxed && toggleMulti("topIssues", issue.id)}>
                {issue.label}
              </button>
            );
          })}
        </div>
        <p className="multi-note">Select up to 3. You've selected {(survey.topIssues || []).length} of 3.</p>
      </div>
    </>
  );
}

// Step 4
function StepBreakdown({ survey }) {
  const pickedIssues = ISSUES.filter(i => (survey.topIssues || []).includes(i.id));

  if (pickedIssues.length === 0) {
    return (
      <>
        <p className="step-eyebrow">Step 4 of 4</p>
        <h2 className="step-title">Your Breakdown</h2>
        <p className="step-intro">You didn't select any issues in the previous step. Go back and pick up to 3 to see a personalized breakdown here.</p>
      </>
    );
  }

  return (
    <>
      <p className="step-eyebrow">Step 4 of 4</p>
      <h2 className="step-title">Your Breakdown</h2>
      <p className="breakdown-intro">
        For each issue you chose, here's how a more limited-government approach and a more active-government approach typically frame the problem and solution. This is context — not a recommendation. You decide what weight to give each.
      </p>

      {pickedIssues.map((issue) => {
        const contextNote = issue.contextFn(survey);
        return (
          <div key={issue.id} className="issue-breakdown">
            <p className="issue-breakdown-title">{issue.label}</p>
            <div className="approach-pair">
              <div className="approach-card">
                <p className="approach-label">Limited-Government Approach</p>
                <p>{issue.limited}</p>
              </div>
              <div className="approach-card">
                <p className="approach-label">Active-Government Approach</p>
                <p>{issue.active}</p>
              </div>
            </div>
            {contextNote && <p className="context-note">↳ {contextNote}</p>}
          </div>
        );
      })}

      <div className="research-box">
        <h3>How to Research Real Candidates Yourself</h3>
        <p style={{ fontSize: ".88rem", color: "var(--ink2)", marginBottom: 14 }}>
          Knowing the issues is step one. Finding out where actual candidates on your ballot stand — in verifiable, specific terms — is step two. Here's how to do it without relying on any single source.
        </p>
        <ol>
          {RESEARCH_STEPS.map((s, i) => <li key={i}>{s.text}</li>)}
        </ol>
        <p className="trade-off-note">
          Every policy involves trade-offs. The most useful question to ask any candidate: "What are you giving up to get this outcome — and who bears that cost?" A candidate who can answer that honestly is showing you something important.
        </p>
      </div>
    </>
  );
}

/* ── Main App ── */
export default function CivicCompass() {
  const [step, setStep] = useState(1);
  const [survey, setSurvey] = useState({
    income: "",
    taxes: "",
    benefits: [],
    religion: "",
    topIssues: [],
  });

  const canAdvance = step < TOTAL_STEPS;
  const canGoBack  = step > 1;

  return (
    <div className="page-shell">
      <header className="masthead">
        <p className="masthead-eyebrow">A nonpartisan voter education guide</p>
        <h1 className="masthead-title">Civic Compass</h1>
        <p className="masthead-sub">Understanding your government before you vote</p>
      </header>

      <ProgressBar step={step} />

      {step === 1 && <StepBranches />}
      {step === 2 && <StepSystems />}
      {step === 3 && <StepAboutYou survey={survey} setSurvey={setSurvey} />}
      {step === 4 && <StepBreakdown survey={survey} />}

      <div className="nav-row">
        <button className="nav-btn" onClick={() => setStep(s => s - 1)} disabled={!canGoBack}>
          ← Back
        </button>
        <span className="step-counter">Step {step} of {TOTAL_STEPS}</span>
        {canAdvance
          ? <button className="nav-btn primary" onClick={() => setStep(s => s + 1)}>
              Next →
            </button>
          : <button className="nav-btn primary" onClick={() => setStep(1)}>
              Start Over
            </button>
        }
      </div>
    </div>
  );
}

/* ── Mount ── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CivicCompass />);
</script>
</body>
</html>
